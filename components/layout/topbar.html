<div class="app-topbar" style="padding:0 24px;display:flex;justify-content:space-between;align-items:center;">
  <div>
    <h2 style="font-size:15px;font-weight:700;margin:0;color:var(--text-main);" id="topbar-title">Dashboard</h2>
    <p style="font-size:12px;color:var(--text-muted);margin:2px 0 0;" id="topbar-sub">Good morning — Here's your claims
      workstation overview</p>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="btn btn-secondary btn-sm" onclick="showScreen('notifications')"
      style="position:relative;padding:6px 12px;border-radius:8px;">
      <i data-lucide="bell" class="icon-sm" style="margin-right:4px;"></i>
      <span
        style="position:absolute;top:-4px;right:-4px;background:#ef4444;color:white;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid white;">5</span>
    </button>
    <div
      style="width:36px;height:36px;border-radius:50%;background:var(--primary-600);color:white;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;"
      id="sb-user-avatar">DS</div>
  </div>
</div>
